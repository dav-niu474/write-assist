<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>素材灵感助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
    }
    
    .header {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      padding: 16px;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 4px;
    }
    
    .content {
      padding: 16px;
    }
    
    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .action-btn:hover {
      border-color: #10b981;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
    }
    
    .action-btn .icon {
      font-size: 24px;
      margin-bottom: 8px;
    }
    
    .action-btn .label {
      font-size: 12px;
      color: #374151;
      font-weight: 500;
    }
    
    .section {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .form-group {
      margin-bottom: 12px;
    }
    
    .form-group:last-child {
      margin-bottom: 0;
    }
    
    .form-group label {
      display: block;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }
    
    .form-group input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #10b981;
    }
    
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #10b981;
      color: white;
    }
    
    .btn-primary:hover {
      background: #059669;
    }
    
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }
    
    .btn-secondary:hover {
      background: #e5e7eb;
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: #ecfdf5;
      border-radius: 8px;
      margin-top: 12px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
    }
    
    .status.error .status-dot {
      background: #ef4444;
    }
    
    .status-text {
      font-size: 12px;
      color: #065f46;
    }
    
    .status.error .status-text {
      color: #991b1b;
    }
    
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      text-align: center;
    }
    
    .footer a {
      color: #6b7280;
      font-size: 12px;
      text-decoration: none;
    }
    
    .footer a:hover {
      color: #10b981;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>
      <span>✨</span>
      素材灵感助手
    </h1>
    <p>一键收藏网页内容</p>
  </div>
  
  <div class="content">
    <!-- 快捷操作 -->
    <div class="quick-actions">
      <div class="action-btn" id="savePage">
        <span class="icon">📄</span>
        <span class="label">收藏页面</span>
      </div>
      <div class="action-btn" id="saveSelection">
        <span class="icon">📝</span>
        <span class="label">收藏选中文本</span>
      </div>
    </div>
    
    <!-- 设置 -->
    <div class="section">
      <div class="section-title">
        <span>⚙️</span>
        设置
      </div>
      <div class="form-group">
        <label>API 地址</label>
        <input type="text" id="apiUrl" placeholder="http://localhost:3000" />
      </div>
      <button class="btn btn-primary" id="saveSettings">保存设置</button>
    </div>
    
    <!-- 状态 -->
    <div class="status" id="status">
      <div class="status-dot"></div>
      <span class="status-text">正在检测服务状态...</span>
    </div>
  </div>
  
  <div class="footer">
    <a href="popup/options.html" target="_blank">更多选项</a>
  </div>

  <script src="popup/popup.js"></script>
</body>
</html>
